<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to my 3D Motion Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;1,400&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            /* 3D 空间网格背景 */
            background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #ffffff;
            overflow-x: hidden;
        }

        @keyframes rollIn {
            0% { opacity: 0; transform: translateX(100px) rotate(30deg); filter: blur(10px); }
            100% { opacity: 1; transform: translateX(0) rotate(0deg); filter: blur(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .animate-roll { animation: rollIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-content { animation: fadeIn 1s ease-out 0.8s both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .avatar-container {
            position: relative;
            animation: float 5s ease-in-out infinite;
        }

        /* 稍微加强了紫色光晕的强度与范围 */
        .avatar-glow {
            position: absolute;
            inset: -5px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.22) 0%, transparent 73%);
            filter: blur(28px);
            z-index: -1;
        }

        .behance-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            line-height: 0;
            width: 100%;
            max-width: 404px;
        }

        .behance-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(167, 139, 250, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* ----------------------------------------------------------- */
        /* 仅针对手机端的专属优化区域 (屏幕宽度 < 640px) */
        /* ----------------------------------------------------------- */
        @media (max-width: 640px) {
            body { 
                /* 核心修改：大幅增加顶部边距，让内容在手机屏幕上居中偏下起始 */
                padding: 12rem 1.5rem 5rem 1.5rem !important; 
            }
            
            .avatar-container img { 
                width: 100px !important;  
                height: 100px !important; 
            }
            
            h2 { font-size: 1rem !important; }
            h1 { font-size: 0.8rem !important; }
            p { font-size: 8px !important; }
            
            .animate-roll {
                margin-bottom: 5rem !important; 
            }
            
            .behance-card { 
                width: 88%; 
                margin: 0 auto;
                transform: scale(0.95);
            }
            
            .animate-content { 
                gap: 5rem; 
                margin-top: 1.5rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 md:p-12">

    <div class="max-w-5xl w-full text-center">
        
        <div class="animate-roll mb-16 inline-flex flex-col items-center">
            
            <div class="avatar-container mb-8">
                <div class="avatar-glow"></div>
                <img src="avatar.png" 
                     alt="Yuzi" 
                     class="w-[140px] h-[140px] object-contain drop-shadow-[0_0_15px_rgba(167,139,250,0.2)]">
            </div>
            
            <div class="flex flex-col items-center gap-2">
                <h2 class="text-white text-lg tracking-[0.3em] font-semibold uppercase">Hi, I'm Yuzi</h2>
                <h1 class="text-zinc-500 text-sm tracking-[0.25em] font-normal uppercase italic">3D Motion Design</h1>
                
                <div class="w-8 h-[1px] bg-zinc-800 my-2"></div>
                
                <p class="text-zinc-400 text-[10px] tracking-[0.3em] uppercase font-normal">Here is my portfolio</p>
            </div>
        </div>

        <div class="animate-content flex flex-col md:flex-row gap-10 justify-center items-center">
            <div class="behance-card">
                <iframe src="https://www.behance.net/embed/project/247108587?ilo0=1" height="316" width="100%" allowfullscreen lazyload frameborder="0"></iframe>
            </div>

            <div class="behance-card">
                <iframe src="https://www.behance.net/embed/project/247583881?ilo0=1" height="316" width="100%" allowfullscreen lazyload frameborder="0"></iframe>
            </div>
        </div>

        <div class="animate-content mt-20">
            <p class="text-zinc-700 text-[9px] tracking-[0.6em] uppercase font-light">
                Thanks for watching
            </p>
        </div>
    </div>

</body>
</html>
