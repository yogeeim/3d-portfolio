<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to my 3D & AI Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;1,400&display=swap');

        /* 부드러운 우주 호흡 애니메이션 결합 */
        @keyframes nebulaMove {
            0%, 100% { background-position: 0% 50%, 100% 50%; }
            50% { background-position: 3% 47%, 97% 53%; }
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #060608; 
            /* [PC 웹 전용 사수] 원본 코드의 컬러 농도와 투명도를 100% 그대로 유지하고 정적인 초저속 무브먼트만 바인딩 */
            background-image: 
                url("https://www.transparenttextures.com/patterns/stardust.png"), 
                radial-gradient(circle at 15% 15%, rgba(152, 181, 66, 0.45) 0%, transparent 45%), 
                radial-gradient(circle at 85% 50%, rgba(66, 40, 92, 0.5) 0%, transparent 50%); 
            background-size: auto, 120% 120%, 120% 120%; 
            animation: nebulaMove 45s ease-in-out infinite; 
            background-attachment: fixed;
            color: #ffffff; 
            overflow-x: hidden;
            overflow-y: auto;
        }

        @keyframes rollIn {
            0% { opacity: 0; transform: translateX(100px) rotate(30deg); filter: blur(10px); }
            100% { opacity: 1; transform: translateX(0) rotate(0deg); filter: blur(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .animate-roll { animation: rollIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-content { animation: fadeIn 1s ease-out 0.8s both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .avatar-container {
            position: relative;
            animation: float 5s ease-in-out infinite;
        }

        /* [PC 웹 전용 사수] 고정값: 보라색 글로우 강도 0.22 및 확산 범위 73% 절대 보존 */
        .avatar-glow {
            position: absolute;
            inset: -5px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.22) 0%, transparent 73%);
            filter: blur(28px);
            z-index: -1;
        }

        /* 비핸스 & 비메오 카드 통합 스타일 - 고정 사이즈 크기 완벽 대칭 */
        .behance-card {
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); 
            line-height: 0;
            width: 100%;
            max-width: 360px;
            height: 280px;
            position: relative;
        }

        /* [보라색 호버] 기본 마우스 아우라 연출 */
        .behance-card.hover-purple:hover {
            transform: translateY(-12px) scale(1.02);
            background: rgba(167, 139, 250, 0.08); 
            border-color: rgba(167, 139, 250, 0.5); 
            box-shadow: 0 25px 50px rgba(167, 139, 250, 0.15), 0 10px 30px rgba(0, 0, 0, 0.5); 
        }

        /* [그린 호버] 기본 마우스 아우라 연출 */
        .behance-card.hover-green:hover {
            transform: translateY(-12px) scale(1.02);
            background: rgba(152, 181, 66, 0.08); 
            border-color: rgba(152, 181, 66, 0.45); 
            box-shadow: 0 25px 50px rgba(152, 181, 66, 0.12), 0 10px 30px rgba(0, 0, 0, 0.5); 
        }

        /* 비메오 맞춤형 업로드 이미지 가득 채우기 커스텀 수식 */
        .custom-cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        /* ----------------------------------------------------------- */
        /* 모바일 화면 전용 정밀 최적화 영역 (SAinT0117 레이아웃 반영) */
        /* ----------------------------------------------------------- */
        @media (max-width: 640px) {
            /* [모바일 전용 성운 상하 대반전 패치] 
               PC 웹판은 100% 그대로 지킨 채, 모바일 환경에서만 독립적으로 보라색 성운을 좌상단(아바타 배경)으로 올리고 
               라임 그린 성운을 우측 하단(스크롤 영역)으로 배치하여 첫 화면의 아티스틱한 아바타 매칭 완성 */
            body { 
                padding: 0 !important; 
                background-image: 
                    url("https://www.transparenttextures.com/patterns/stardust.png"), 
                    radial-gradient(circle at 15% 15%, rgba(66, 40, 92, 0.5) 0%, transparent 50%), /* 보라색 성운 상단 전면 배치 */
                    radial-gradient(circle at 85% 85%, rgba(152, 181, 66, 0.45) 0%, transparent 45%); /* 라임 그린 성운 하단 전면 배치 */
                background-size: auto, 100% 100%, 100% 100%; 
            }
            .mobile-container {
                padding: 8rem 1.5rem 5rem 1.5rem !important; 
            }
            
            .avatar-container img { 
                width: 80px !important; 
                height: 80px !important;
            }

            /* 모바일 환경에서만 독립적으로 투명도를 최적화하여 상단 보라색 성운과 함께 깊이감 극대화 */
            .avatar-glow {
                background: radial-gradient(circle, rgba(167, 139, 250, 0.65) 0%, transparent 73%) !important;
                filter: blur(20px) !important;
            }
            
            h2 { font-size: 0.9rem !important; margin-bottom: 0 !important; }
            p { font-size: 7px !important; }
            
            .animate-roll {
                margin-bottom: 1.5rem !important;
            }
            
            .behance-card { 
                width: 85%;
                margin: 0 auto;
                transform: scale(0.92);
                max-width: 404px;
            }
            
            .animate-content { 
                gap: 3.5rem !important;
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center py-24 md:py-32 px-6 md:px-12">

    <div class="max-w-4xl w-full text-center mobile-container">
        
        <!-- 프로필 헤더 섹션 -->
        <div class="animate-roll mb-16 inline-flex flex-col items-center">
            
            <div class="avatar-container mb-8">
                <div class="avatar-glow"></div>
                <img src="avatar.png" 
                     alt="Yuzi" 
                     class="w-[140px] h-[140px] object-contain drop-shadow-[0_0_15px_rgba(167,139,250,0.2)]">
            </div>
            
            <div class="flex flex-col items-center gap-2">
                <h2 class="text-white text-lg tracking-[0.3em] font-semibold uppercase">Hi, I'm Yuzi</h2>
                <h1 class="text-zinc-500 text-sm tracking-[0.25em] font-light uppercase italic">3D Motion / AI Design</h1>
                
                <div class="w-8 h-[1px] bg-zinc-800 my-2"></div>
                
                <p class="text-zinc-400 text-[10px] tracking-[0.3em] uppercase font-normal">Here is my portfolio</p>
            </div>
        </div>

        <!-- 포트폴리오 그리드 섹션 -->
        <div class="animate-content grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-16 justify-items-center items-end w-full max-w-3xl mx-auto">
            
            <!-- [1행 왼쪽 - TOP 1위 자리] 아디다스 AI 비메오 링크 연동 카드 (모바일에서는 상단 보라성운에 맞춰 hover-purple로 인터랙션 변경) -->
            <div class="flex flex-col items-center gap-2 w-full max-w-[360px] sm:max-w-none">
                <span class="text-zinc-400 text-[9px] tracking-[0.4em] uppercase font-bold block w-full text-center md:text-left pl-2">AI</span>
                <a href="https://vimeo.com/1199532686?share=copy&fl=sv&fe=ci" target="_blank" class="behance-card hover-purple md:hover-green block cursor-pointer">
                    <img src="adidas-cover.png" alt="adidas - YOU GOT THIS | AI Spec Commercial" class="custom-cover-img">
                </a>
            </div>

            <!-- [1행 오른쪽 - 2위 자리] 기존 첫 번째 AI 작품 (모바일에서는 상단 보라성운에 맞춰 hover-purple로 인터랙션 변경) -->
            <div class="flex flex-col items-center gap-2 w-full max-w-[360px] sm:max-w-none">
                <span class="text-zinc-400 text-[9px] tracking-[0.4em] uppercase font-bold block w-full text-center md:text-left pl-2">AI</span>
                <div class="behance-card hover-purple md:hover-green">
                    <iframe src="https://www.behance.net/embed/project/249936805?ilo0=1" height="280" width="100%" allowfullscreen lazyload frameborder="0" allow="clipboard-write"></iframe>
                </div>
            </div>

            <!-- [2행 왼쪽] 프로젝트 3 (3D + AI) (모바일에서는 하단 그린성운에 맞춰 hover-green으로 인터랙션 변경) -->
            <div class="flex flex-col items-center gap-2 w-full max-w-[360px] sm:max-w-none">
                <span class="text-zinc-500 text-[9px] tracking-[0.4em] uppercase font-semibold block w-full text-center md:text-left pl-2">3D + AI</span>
                <div class="behance-card hover-green md:hover-purple">
                    <iframe src="https://www.behance.net/embed/project/247108587?ilo0=1" height="280" width="100%" allowfullscreen lazyload frameborder="0"></iframe>
                </div>
            </div>

            <!-- [2행 오른쪽] 프로젝트 4 (3D + AI) (모바일에서는 하단 그린성운에 맞춰 hover-green으로 인터랙션 변경) -->
            <div class="flex flex-col items-center gap-2 w-full max-w-[360px] sm:max-w-none">
                <span class="text-zinc-500 text-[9px] tracking-[0.4em] uppercase font-semibold block w-full text-center md:text-left pl-2">3D + AI</span>
                <div class="behance-card hover-green md:hover-purple">
                    <iframe src="https://www.behance.net/embed/project/247583881?ilo0=1" height="280" width="100%" allowfullscreen lazyload frameborder="0"></iframe>
                </div>
            </div>

        </div>

        <!-- 푸터 섹션 -->
        <div class="animate-content mt-20">
            <p class="text-zinc-600 text-[9px] tracking-[0.6em] uppercase font-medium">
                Thanks for watching
            </p>
        </div>
    </div>

</body>
</html>
