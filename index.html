<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to my 3D & AI Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;1,400&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            /* 3D 공간 그리드 배경 */
            background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #ffffff;
            overflow-x: hidden;
        }

        @keyframes rollIn {
            0% { opacity: 0; transform: translateX(100px) rotate(30deg); filter: blur(10px); }
            100% { opacity: 1; transform: translateX(0) rotate(0deg); filter: blur(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .animate-roll { animation: rollIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-content { animation: fadeIn 1s ease-out 0.8s both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .avatar-container {
            position: relative;
            animation: float 5s ease-in-out infinite;
        }

        /* 고정값: 보라색 글로우 강도 0.22 및 확산 범위 73% */
        .avatar-glow {
            position: absolute;
            inset: -5px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.22) 0%, transparent 73%);
            filter: blur(28px);
            z-index: -1;
        }

        /* 비핸스 카드 스타일 - 웹 버전 크기 약간 확대 */
        .behance-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            line-height: 0;
            width: 100%;
            max-width: 360px; /* 카드를 더 시원하게 보이도록 크기 확대 */
        }

        .behance-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(167, 139, 250, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* ----------------------------------------------------------- */
        /* 모바일 화면 전용 정밀 최적화 영역 (SAinT0117 레이아웃 반영) */
        /* ----------------------------------------------------------- */
        @media (max-width: 640px) {
            body { 
                /* 상단 여백을 조정하여 헤더가 편안한 높이에 위치하도록 설정 */
                padding: 8rem 1.5rem 5rem 1.5rem !important; 
            }
            
            /* 1. 아바타 크기 축소 (모바일 비례 최적화) */
            .avatar-container img { 
                width: 80px !important;  
                height: 80px !important; 
            }
            
            /* 2. 텍스트 간격 압축 */
            h2 { font-size: 0.9rem !important; margin-bottom: 0 !important; }
            h1 { font-size: 0.75rem !important; margin-bottom: 0.2rem !important; }
            p { font-size: 7px !important; }
            
            /* 3. 핵심 수정: 소개 텍스트와 작품 카드 사이의 간격을 좁혀 밀착감 구현 */
            .animate-roll {
                margin-bottom: 1.5rem !important; 
            }
            
            /* 4. 작품 카드 비율 미세 조정 */
            .behance-card { 
                width: 85%; 
                margin: 0 auto;
                transform: scale(0.92);
                max-width: 404px; /* 모바일 가로폭 복원 */
            }
            
            .animate-content { 
                gap: 3.5rem !important; 
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 md:p-12">

    <!-- max-w-5xl에서 max-w-6xl로 넓혀 가로 3열이 넉넉하게 들어가도록 설정 -->
    <div class="max-w-6xl w-full text-center">
        
        <!-- 프로필 헤더 섹션 -->
        <div class="animate-roll mb-16 inline-flex flex-col items-center">
            
            <div class="avatar-container mb-8">
                <div class="avatar-glow"></div>
                <img src="avatar.png" 
                     alt="Yuzi" 
                     class="w-[140px] h-[140px] object-contain drop-shadow-[0_0_15px_rgba(167,139,250,0.2)]">
            </div>
            
            <div class="flex flex-col items-center gap-2">
                <h2 class="text-white text-lg tracking-[0.3em] font-semibold uppercase">Hi, I'm Yuzi</h2>
                <h1 class="text-zinc-500 text-sm tracking-[0.25em] font-normal uppercase italic">3D Motion / AI Design</h1>
                
                <div class="w-8 h-[1px] bg-zinc-800 my-2"></div>
                
                <p class="text-zinc-400 text-[10px] tracking-[0.3em] uppercase font-normal">Here is my portfolio</p>
            </div>
        </div>

        <!-- 포트폴리오 그리드 섹션 (가로 3열 레이아웃 및 카드 확대 반영) -->
        <div class="animate-content grid grid-cols-1 md:grid-cols-3 gap-8 md:gap-6 justify-items-center items-end w-full mx-auto">
            
            <!-- 신규 프로젝트 1 (AI) -->
            <div class="flex flex-col items-center gap-2 w-full max-w-[360px] sm:max-w-none">
                <span class="text-zinc-500 text-[9px] tracking-[0.4em] uppercase font-semibold block w-full text-center md:text-left pl-2 text-indigo-400/80">AI</span>
                <div class="behance-card">
                    <iframe src="https://www.behance.net/embed/project/249936805?ilo0=1" height="280" width="100%" allowfullscreen lazyload frameborder="0" allow="clipboard-write"></iframe>
                </div>
            </div>

            <!-- 프로젝트 2 (3D + AI) -->
            <div class="flex flex-col items-center gap-2 w-full max-w-[360px] sm:max-w-none">
                <span class="text-zinc-600 text-[9px] tracking-[0.4em] uppercase font-normal block w-full text-center md:text-left pl-2">3D + AI</span>
                <div class="behance-card">
                    <iframe src="https://www.behance.net/embed/project/247108587?ilo0=1" height="280" width="100%" allowfullscreen lazyload frameborder="0"></iframe>
                </div>
            </div>

            <!-- 프로젝트 3 (3D + AI) -->
            <div class="flex flex-col items-center gap-2 w-full max-w-[360px] sm:max-w-none">
                <span class="text-zinc-600 text-[9px] tracking-[0.4em] uppercase font-normal block w-full text-center md:text-left pl-2">3D + AI</span>
                <div class="behance-card">
                    <iframe src="https://www.behance.net/embed/project/247583881?ilo0=1" height="280" width="100%" allowfullscreen lazyload frameborder="0"></iframe>
                </div>
            </div>

        </div>

        <!-- 푸터 섹션 -->
        <div class="animate-content mt-20">
            <p class="text-zinc-700 text-[9px] tracking-[0.6em] uppercase font-light">
                Thanks for watching
            </p>
        </div>
    </div>

</body>
</html>
